# Alembic configuration for the CocktailBerry Payment backend.
#
# This file is only used by the Alembic *CLI* during development, e.g.
#   uv run --extra api alembic revision --autogenerate -m "describe change"
#   uv run --extra api alembic upgrade head
#
# At runtime the app does NOT read this file: it calls
# `src.backend.db.database.run_db_migrations()`, which configures Alembic
# programmatically (script location resolved from the package, DB URL from the
# app config). That keeps migrations working inside the Docker image, which
# only copies `src/` and therefore would not include this file.
[alembic]
script_location = %(here)s/src/backend/db/migrations
prepend_sys_path = .
path_separator = os
# Placeholder only. The real URL is resolved in env.py from the app config.
sqlalchemy.url = sqlite:///

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
